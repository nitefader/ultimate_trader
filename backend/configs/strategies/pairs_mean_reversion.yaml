# ────────────────────────────────────────────────────────────────────────────
# Pairs Mean Reversion — cointegration-based spread reversion entries
# ────────────────────────────────────────────────────────────────────────────

name: "Pairs Mean Reversion - Cointegration Fade"
category: pairs
description: >
  A pairs trading strategy that monitors the spread between cointegrated pairs and
  takes mean-reversion positions when the z-score exceeds thresholds. Uses daily
  rebalancing with tight stops and time-based exits.

pairs:
  - ["XLF", "KBE"]
  - ["QQQ", "SPY"]

timeframe: "1d"

indicators:
  spread_zscore_window: 60
  rsi_periods: [14]

entry:
  directions:
    - long
    - short
  logic: "all_of"
  conditions:
    - type: single
      left: {indicator: "spread_zscore"}
      op: ">"
      right: 2.0
    - type: single
      left: {indicator: "spread_zscore"}
      op: "<"
      right: -2.0

stop_loss:
  method: "combined"
  rule: "closest"
  stops:
    - method: "atr_multiple"
      period: 14
      mult: 1.6
    - method: "n_bars_low"
      n: 5

targets:
  - method: "r_multiple"
    r: 1.0

scale_out: null
scale_in: null

position_sizing:
  method: "risk_pct"
  risk_pct: 0.5

leverage: 1.0

risk:
  max_position_size_pct: 0.06
  max_daily_loss_pct: 0.02
  max_drawdown_lockout_pct: 0.08
  max_open_positions: 4
  max_portfolio_heat: 0.05

cooldown_rules:
  - trigger: "consecutive_loss"
    consecutive_count: 2
    session_reset: true

tick_size: 0.01
