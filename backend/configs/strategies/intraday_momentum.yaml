# ────────────────────────────────────────────────────────────────────────────
# Intraday Momentum — opening breakout for first-hour trend capture
# ────────────────────────────────────────────────────────────────────────────

name: "Intraday Momentum - Opening Breakout"
category: momentum
description: >
  Capture opening momentum by detecting early breakout above the opening range
  with volume confirmation. Trailing stop is used to capture extended moves while
  minimizing early noise.

symbols:
  - SPY
  - QQQ
  - AAPL

timeframe: "5m"

indicators:
  opening_range_bars: 6
  ema_periods: [9, 21]
  atr_period: 14

entry:
  directions:
    - long
  logic: "all_of"
  conditions:
    - type: single
      left: {field: "close"}
      op: ">"
      right: {indicator: "opening_range_high"}
    - type: single
      left: {indicator: "volume"}
      op: ">"
      right: {indicator: "volume_avg_50", mult: 1.25}

stop_loss:
  method: "atr_multiple"
  period: 14
  mult: 1.8

targets:
  - method: "r_multiple"
    r: 1.5

trailing_stop:
  method: "chandelier"
  period: 22
  mult: 3.0

position_sizing:
  method: "risk_pct"
  risk_pct: 1.0

leverage: 1.0

risk:
  max_position_size_pct: 0.10
  max_daily_loss_pct: 0.03
  max_drawdown_lockout_pct: 0.10
  max_open_positions: 3
  max_portfolio_heat: 0.05

cooldown_rules:
  - trigger: "stop_out"
    duration_minutes: 60
    symbol_level: true

tick_size: 0.01
