# ────────────────────────────────────────────────────────────────────────────
# Momentum Strategy — Trend-following with structure-aware stops and FVG targets
# ────────────────────────────────────────────────────────────────────────────

name: "Momentum - Trend Following"
category: momentum
description: >
  A trend-following momentum strategy using EMA crossover, RSI confirmation,
  ADX trend strength filter, and swing-based stops. Uses scale-out logic to
  take partial profit at 1R and let the rest ride with a trailing stop.
  Regime filter ensures we only trade trending markets.

symbols:
  - SPY
  - QQQ
  - AAPL

timeframe: "1d"

indicators:
  ema_periods: [21, 55, 200]
  sma_periods: [50, 200]
  rsi_periods: [14]

# ── Market regime filter ─────────────────────────────────────────────────────
regime_filter:
  allowed:
    - trending_up   # long only in trending_up
    - trending_down # short only in trending_down

use_support_resistance: true

# ── Entry rules ──────────────────────────────────────────────────────────────
entry:
  directions:
    - long   # strategy also supports short (see short_conditions below)

  # N-of-M logic: 4 of 5 conditions required for entry
  logic: "n_of_m:4"

  conditions:
    - type: single
      left: {indicator: "ema_21"}
      op: ">"
      right: {indicator: "ema_55"}

    - type: single
      left: {indicator: "ema_55"}
      op: ">"
      right: {indicator: "ema_200"}

    - type: single
      left: {indicator: "rsi_14"}
      op: ">"
      right: 50

    - type: single
      left: {indicator: "adx"}
      op: ">"
      right: 25

    - type: single
      left: {indicator: "close"}
      op: "crosses_above"
      right: {indicator: "ema_21"}

# ── Stop loss ────────────────────────────────────────────────────────────────
stop_loss:
  method: "combined"
  rule: "farthest"   # use the more protective stop
  stops:
    - method: "swing_low"
      lookback: 3
    - method: "atr_multiple"
      period: 14
      mult: 2.0

# ── Profit targets ───────────────────────────────────────────────────────────
targets:
  - method: "r_multiple"
    r: 1.0       # Target 1: 1R → take partial

  - method: "r_multiple"
    r: 3.0       # Target 2: 3R → take remainder or trail

# ── Trailing stop (activated after target 1) ──────────────────────────────────
trailing_stop:
  method: "chandelier"
  period: 22
  mult: 3.0

# ── Scale out ────────────────────────────────────────────────────────────────
scale_out:
  move_stop_to_be_after_t1: true
  levels:
    - pct: 50    # exit 50% at target 1
    - pct: 50    # exit remaining 50% at target 2 or trail

# ── Scale in ─────────────────────────────────────────────────────────────────
scale_in:
  max_adds: 2
  conditions:
    - type: single
      left: {indicator: "rsi_14"}
      op: ">"
      right: 55
    - type: single
      left: {indicator: "adx"}
      op: ">"
      right: 30
  levels:
    - level: 0
      pct: 60    # 60% at initial entry
    - level: 1
      pct: 25    # 25% on first add
    - level: 2
      pct: 15    # 15% on second add

# ── Position sizing ───────────────────────────────────────────────────────────
position_sizing:
  method: "risk_pct"
  risk_pct: 1.0    # risk 1% of equity per trade

leverage: 1.0

# ── Risk controls ─────────────────────────────────────────────────────────────
risk:
  max_position_size_pct: 0.10
  max_daily_loss_pct: 0.03
  max_drawdown_lockout_pct: 0.10
  max_open_positions: 5
  max_portfolio_heat: 0.05

# ── Cooldown rules ────────────────────────────────────────────────────────────
cooldown_rules:
  - trigger: "consecutive_loss"
    consecutive_count: 2
    session_reset: true       # wait until next session after 2 losses in a row
    symbol_level: true

  - trigger: "stop_out"
    duration_minutes: 60      # 60-minute cooldown after stop-out
    symbol_level: true

# ── Event filter ──────────────────────────────────────────────────────────────
event_filter:
  categories: [fomc, cpi, nfp]
  impact_levels: [high]
  minutes_before: 30
  minutes_after: 30
  disable_entries: true
  close_positions_before: false

tick_size: 0.01
