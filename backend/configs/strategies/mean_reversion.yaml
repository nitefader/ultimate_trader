# ────────────────────────────────────────────────────────────────────────────
# Mean Reversion Strategy — FVG / S&R based mean reversion with tight stops
# ────────────────────────────────────────────────────────────────────────────

name: "Mean Reversion - FVG Fade"
category: mean_reversion
description: >
  A mean reversion strategy that fades moves into Fair Value Gaps and support/resistance zones.
  Uses RSI oversold/overbought + Bollinger Band extremes + FVG detection.
  Regime filter: only trades ranging or low-volatility markets.
  FVG low provides the stop reference. Bollinger mid or prior swing provides target.

symbols:
  - SPY
  - GLD
  - TLT

timeframe: "1d"

indicators:
  ema_periods: [20]
  sma_periods: [20, 50]
  rsi_periods: [14]

# ── Regime filter — only range / low vol ─────────────────────────────────────
regime_filter:
  allowed:
    - ranging
    - low_volatility

use_support_resistance: true

# ── Entry rules ───────────────────────────────────────────────────────────────
entry:
  directions:
    - long
    - short

  # 6-of-7 logic for high-confidence entries
  logic: "n_of_m:3"

  conditions:
    # Price near lower Bollinger Band (for long)
    - type: single
      left: {field: "close"}
      op: "<"
      right: {indicator: "bb_lower"}

    # RSI oversold
    - type: single
      left: {indicator: "rsi_14"}
      op: "<"
      right: 35

    # Price near support zone (use nearest S/R support)
    - type: single
      left: {field: "close"}
      op: ">"
      right: {nearest_sr_support: true}

  short_conditions:
    - type: single
      left: {field: "close"}
      op: ">"
      right: {indicator: "bb_upper"}

    - type: single
      left: {indicator: "rsi_14"}
      op: ">"
      right: 65

    - type: single
      left: {field: "close"}
      op: "<"
      right: {nearest_sr_resistance: true}

# ── Stop loss — below FVG low or prior swing low ─────────────────────────────
stop_loss:
  method: "combined"
  rule: "farthest"
  stops:
    - method: "fvg_low"
      direction: "bullish"
    - method: "atr_multiple"
      period: 14
      mult: 1.5
    - method: "n_bars_low"
      n: 5

# ── Targets — Bollinger mid or S/R resistance ───────────────────────────────
targets:
  - method: "r_multiple"
    r: 1.0     # Target 1: 1R

  - method: "r_multiple"
    r: 2.0     # Target 2: BB mid or 2R

# ── Scale out — simple two-part exit ──────────────────────────────────────────
scale_out:
  move_stop_to_be_after_t1: true
  levels:
    - pct: 60    # 60% at target 1
    - pct: 40    # 40% at target 2

# ── No scale in for mean reversion (don't average into a loser) ──────────────
scale_in: null

# ── Position sizing ───────────────────────────────────────────────────────────
position_sizing:
  method: "risk_pct"
  risk_pct: 0.75   # 0.75% risk per trade (smaller than momentum)

leverage: 1.0

# ── Risk controls ─────────────────────────────────────────────────────────────
risk:
  max_position_size_pct: 0.08
  max_daily_loss_pct: 0.02
  max_drawdown_lockout_pct: 0.08
  max_open_positions: 4
  max_portfolio_heat: 0.04

# ── Cooldown rules ────────────────────────────────────────────────────────────
cooldown_rules:
  - trigger: "stop_out"
    duration_minutes: 120     # 2-hour cooldown after stop-out
    symbol_level: true

  - trigger: "consecutive_loss"
    consecutive_count: 3
    session_reset: true       # reset at session open

# ── Event filter ──────────────────────────────────────────────────────────────
event_filter:
  categories: [fomc, cpi, nfp, earnings]
  impact_levels: [high, medium]
  minutes_before: 60
  minutes_after: 60
  close_positions_before: true
  minutes_before_close: 15
  disable_entries: true

# ── Time-based exit ───────────────────────────────────────────────────────────
exit:
  time_exit:
    max_bars: 20    # force exit after 20 bars if no target/stop hit

tick_size: 0.01
