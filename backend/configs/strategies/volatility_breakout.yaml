# ────────────────────────────────────────────────────────────────────────────
# Volatility Breakout — Donchian/ATR breakout with volatility confirmation
# ────────────────────────────────────────────────────────────────────────────

name: "Volatility Breakout - Donchian"
category: momentum
description: >
  A volatility breakout strategy using Donchian channel breakouts confirmed by
  ATR expansion and volume. Targets large moves with ATR-based protective stops
  and trailing exits to capture extended trends.

symbols:
  - SPY
  - QQQ
  - NVDA

timeframe: "1d"

indicators:
  donchian_period: 20
  atr_period: 14

entry:
  directions:
    - long
  logic: "all_of"
  conditions:
    - type: single
      left: {field: "close"}
      op: ">"
      right: {indicator: "donchian_high"}
    - type: single
      left: {indicator: "atr"}
      op: ">"
      right: {indicator: "atr_avg_50", mult: 1.2}

stop_loss:
  method: "atr_multiple"
  period: 14
  mult: 2.0

targets:
  - method: "r_multiple"
    r: 2.0
  - method: "r_multiple"
    r: 4.0

trailing_stop:
  method: "chandelier"
  period: 22
  mult: 3.0

scale_out:
  move_stop_to_be_after_t1: true
  levels:
    - pct: 50
    - pct: 50

position_sizing:
  method: "risk_pct"
  risk_pct: 1.0

leverage: 1.0

risk:
  max_position_size_pct: 0.12
  max_daily_loss_pct: 0.03
  max_drawdown_lockout_pct: 0.12
  max_open_positions: 4
  max_portfolio_heat: 0.06

cooldown_rules:
  - trigger: "stop_out"
    duration_minutes: 180
    symbol_level: true

tick_size: 0.01
